Here is the complete workflow definition based on your requirements:

YAML
name: 'Terraform AWS Workflow'

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  terraform:
    name: 'Terraform Actions'
    runs-on: ubuntu-latest

    # Injecting AWS credentials from GitHub Secrets into the environment
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      # You may also need to define your AWS region depending on your provider configuration:
      # AWS_REGION: "us-east-1" 

    steps:
      # 1. Checks out the repository code
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Installs Terraform
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      # 3. Runs terraform init
      - name: Terraform Init
        run: terraform init

      # 4. Runs terraform validate
      - name: Terraform Validate
        run: terraform validate

      # 5. Runs terraform plan
      - name: Terraform Plan
        run: terraform plan

      # 6. Runs terraform apply
      - name: Terraform Apply
        # Safety Guardrail: It is a best practice to only run 'apply' when code is officially merged (pushed) to main.
        # Running 'apply' on an open Pull Request can modify your live infrastructure before the code is actually approved.
        # If you strictly want it to run on PRs as well, remove the 'if' condition below.
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: terraform apply -auto-approve